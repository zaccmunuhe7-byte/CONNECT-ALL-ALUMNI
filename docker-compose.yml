services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: connect_alumni
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

volumes:
  postgres-data:
